<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Patrol Points Leaderboard</title>
  <style>
    body {
      background: #111;
      color: white;
      font-family: Arial, sans-serif;
      padding: 20px;
    }
    h1 {
      text-align: center;
      margin-bottom: 20px;
    }
    .entry {
      background: #222;
      padding: 12px;
      margin: 8px 0;
      border-radius: 6px;
      font-size: 20px;
    }
  </style>
</head>
<body>

<h1>Patrol Points</h1>
<div id="leaderboard"></div>

<script>
async function loadLeaderboard() {
  try {
    const response = await fetch("patrols.json?cache=" + Date.now());
    const patrols = await response.json();

    patrols.sort((a, b) => b.points - a.points);

    const container = document.getElementById("leaderboard");
    container.innerHTML = "";

    patrols.forEach((p, i) => {
      const div = document.createElement("div");
      div.className = "entry";
      div.textContent = `#${i + 1}: ${p.name.toUpperCase()} — ${p.points}`;
      container.appendChild(div);
    });

  } catch (err) {
    console.error("Error loading JSON:", err);
  }
}

loadLeaderboard();
</script>

</body>
</html>
