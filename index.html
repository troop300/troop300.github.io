<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Patrol Points Leaderboard</title>
  <style>
    body {
      background: #111;
      color: white;
      font-family: Arial, sans-serif;
      padding: 20px;
    }
    h1 {
      text-align: center;
      margin-bottom: 20px;
    }
    .entry {
      padding: 12px;
      margin: 8px 0;
      border-radius: 6px;
      font-size: 20px;
      background: #222;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .color-box {
      width: 20px;
      height: 20px;
      border-radius: 4px;
      margin-left: 10px;
      border: 1px solid #000;
    }
  </style>
</head>
<body>

<h1>Patrol Points</h1>
<div id="leaderboard"></div>

<script>
async function loadLeaderboard() {
  try {
    const response = await fetch("https://raw.githubusercontent.com/jacobrdale/pp/main/patrols.json");
    const patrols = await response.json();

    patrols.sort((a, b) => b.points - a.points);

    const container = document.getElementById("leaderboard");
    container.innerHTML = "";

    patrols.forEach((p, i) => {
      const div = document.createElement("div");
      div.className = "entry";

      const medal = i === 0 ? "🥇 " : "";

      div.innerHTML = `
        <span>#${i + 1}: ${medal}${p.name.toUpperCase()} — ${p.points}</span>
        <div class="color-box" style="background:${p.color}"></div>
      `;

      container.appendChild(div);
    });

  } catch (err) {
    console.error("Error loading JSON:", err);
  }
}

loadLeaderboard();
</script>

</body>
</html>
